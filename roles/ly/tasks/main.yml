---
- name: install ly
  community.general.pacman:
    name: ly
    state: present
  become: true

- name: enable ly
  ansible.builtin.systemd:
    name: ly@tty2.service
    enabled: true
    masked: false
  become: true

- name: configure ly
  ansible.builtin.blockinfile:
    path: /etc/ly/config.ini
    block: |
      animation = colormix
      bigclock = en
      battery_id = BAT1
    marker: "# {mark} ANSIBLE MANAGED BLOCK"
  become: true
