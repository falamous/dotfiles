---
- name: install gdb and gef
  community.general.pacman:
    name:
      - gdb
      - gef
    state: present
  become: true

- name: install gdb-multiarch
  kewlfft.aur.aur:
    name:
      - gdb-multiarch
    state: present

- name: enable gef
  ansible.builtin.blockinfile:
    path: "/etc/gdb/gdbinit"
    block: |
      source /usr/share/gef/gef.py
      gef config context.clear_screen false
      gef config context.legend "legend regs stack code args source memory threads extra"
      set auto-load safe-path /
    marker: "# {mark} ANSIBLE MANAGED BLOCK"
  become: true


- name: extend zsh env
  ansible.builtin.blockinfile:
    path: "{{ config.general.shellenv }}"
    block: |
      export GDBHISTFILE="$XDG_CACHE_HOME/gdb_history"
    marker: "# {mark} ANSIBLE (gdb) MANAGED BLOCK"
    create: true
    mode: "0644"
